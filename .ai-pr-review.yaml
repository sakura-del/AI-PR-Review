# AI PR Review 项目级配置
# 放置在仓库根目录，用于自定义审查行为

# 忽略的文件路径（支持 glob 模式）
ignore_paths:
  - "*.lock"
  - "*.generated.*"
  - "package-lock.json"
  - "vendor/"
  - "node_modules/"
  - "__pycache__/"
  - "*.min.js"
  - "*.min.css"

# 自定义审查规则（会追加到 prompt 中作为团队规则）
custom_rules:
  - "所有新增的 API 端点必须包含认证检查"
  - "数据库查询必须使用参数化方式，禁止字符串拼接"
  - "错误信息不得包含敏感数据（如密码、token）"

# 最大上下文文件数量
max_context_files: 10

# 启用的专家模块（留空则使用默认全部专家）
enabled_experts:
  - security
  - architecture
  - performance

# 覆盖/扩展内置专家的 checklist 和 red_flags
# checklist_append: 追加到原有 checklist
# checklist_replace: 完全替换原有 checklist
# red_flags_append / red_flags_replace: 同理
expert_overrides:
  security:
    checklist_append:
      - "内部API必须使用mTLS认证"
      - "禁止在日志中记录PII数据"
    red_flags_append:
      - "未经审批的外部服务调用"
  readability:
    checklist_replace:
      - "遵循公司编码规范v3.2"
      - "所有public方法必须有文档注释"

# 添加全新自定义专家
# key 为专家标识符，用于关键词匹配和内部引用
custom_experts:
  company_compliance:
    name: "合规审查"
    knowledge_source: "公司内部合规标准"
    checklist:
      - "数据导出必须经过脱敏处理"
      - "用户数据访问必须有审计日志"
      - "第三方SDK需通过安全评审"
    red_flags:
      - "未经审批的第三方依赖"
      - "缺少数据分类标注"

# 团队规范学习配置
team_learning:
  enabled: true
  max_prs: 20
  max_comments: 100
  min_rule_weight: 0.3
  auto_learn: false
  rule_ttl_days: 30
